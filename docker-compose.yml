version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: mono-postgres
    restart: always
    environment:
      POSTGRES_DB: mono
      POSTGRES_USER: mono
      POSTGRES_PASSWORD: mono
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
